# FreeHV unattended-install preseed (Debian 12/13).
#
# Drives a hands-off Debian base install, then hands the box over to
# setup.sh (copied from the install media) to turn it into a FreeHV appliance.
#
# WARNING: the partitioning section ERASES the target disk. This is intended
# for a dedicated hypervisor box.

#### Localization (adjust to taste) ########################################
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

#### Network ################################################################
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string freehv
d-i netcfg/get_domain string local
d-i netcfg/hostname string freehv
# Use DHCP; the appliance can be given a static lease/reservation on your router.

#### Mirror #################################################################
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

#### Clock & time zone ######################################################
d-i clock-setup/utc boolean true
d-i time/zone string Etc/UTC
d-i clock-setup/ntp boolean true

#### Accounts ###############################################################
# Root login disabled; a sudo-capable admin account is created instead.
# CHANGE THIS PASSWORD: this is the OS login, separate from the FreeHV web
# admin password (which is auto-generated and printed to the journal).
d-i passwd/root-login boolean false
d-i passwd/user-fullname string FreeHV Admin
d-i passwd/username string freehv
d-i passwd/user-password password changeme
d-i passwd/user-password-again password changeme
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false

#### Partitioning (ERASES DISK) ############################################
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman/default_filesystem string ext4
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

#### Base system + packages ################################################
tasksel tasksel/first multiselect standard, ssh-server
# Keep the base lean; setup.sh installs the virtualization stack.
d-i pkgsel/include string sudo curl
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

#### Bootloader ############################################################
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

#### Finish ################################################################
d-i finish-install/reboot_in_progress note

#### Hand off to FreeHV provisioner ########################################
# The build script places the repo at /freehv on the install media, which the
# installer exposes at /cdrom/freehv. Copy it in and run the provisioner in
# the target chroot (installs KVM/libvirt/daemon and enables the service).
d-i preseed/late_command string \
    cp -a /cdrom/freehv /target/opt/freehv ; \
    in-target bash /opt/freehv/appliance/setup.sh --in-target
